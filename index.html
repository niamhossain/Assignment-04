<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind + daisyUI and font-->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
    <title>Job Application Tracker</title>
</head>
<body class="bg-base-200">

        <header class="w-9/12 mx-auto pt-[60px] pb-[30px] border-b-2 border-base-300">
            <h1 class="text-2xl font-bold pb-5">Job Application Tracker</h1>

            <div class="cardContainer grid grid-cols-3 gap-4">

                <div class="card bg-base-100 shadow-sm h-24">
            <div class="card-body">
                <h5>Total</h5>
                <p id="totalApplied" class="text-neutral font-bold text-2xl">8</p>
            </div>
                </div>
                <div class="card bg-base-100 shadow-sm h-24">
            <div class="card-body">
                <h5>Interview</h5>
                <p id="totalInterviewee" class="text-success font-bold text-2xl">0</p>
            </div>
                </div>
                <div class="card bg-base-100 shadow-sm h-24">
            <div class="card-body">
                <h5>Rejected</h5>
                <p id="totalRejected" class="text-error font-bold text-2xl">0</p>
            </div>
                </div>

            </div>
        </header>

        <main class="w-9/12 mx-auto pt-[30px]">
            <div class="flex justify-between">
                <h2 class="text-[20px] font-semibold">Available Jobs</h2>
                <p class="text-neutral-500">8 Jobs</p>
            </div>
            <!-- Buttons -->
            <div class="flex gap-2 pt-6">
                <button class="btn btn-primary">All</button>
                <button class="btn text-neutral-500">Interview</button>
                <button class="btn text-neutral-500">Rejected</button>
            </div>

            <!-- Cards -->
        <div class="card bg-base-100 shadow-sm">
            <div class="card-body">
                <h2 class="card-title">Mobile First Corp</h2>
                <p class="text-base text-neutral-500 pb-3">React Native Developer</p>
                <!-- <p class="py-5 text-sm">Remote • Full-time • $130,000 - $175,000</p> -->
                 <ul class="flex gap-7 text-neutral-500">
                    <li>Remote</li>
                    <li class="list-disc">Full-time</li>
                    <li class="list-disc">$130,000 - $175,000</li>
                 </ul>
                 <br>
                <div>
                    <button class="btn btn-active bg-[#EEF4FF] text-neutral-600 border-0 mb-2">NOT APPLIED</button>
                </div>
                <p class="mb-5">Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.</p>
                <div class="card-actions">
                <button class="btn btn-outline btn-success">INTERIEW</button>
                <button class="btn btn-outline btn-error">REJECTED</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
